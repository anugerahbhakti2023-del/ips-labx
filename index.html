<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laboratorium Digital IPS</title>

<!-- SUPABASE CDN -->
<script src="https://qiyexewquvbtfcyjiomh.supabase.co"></script>

<style>
body {
  margin: 0;
  font-family: Poppins, sans-serif;
  background: #f8fafc;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 60px;
  background: #2563eb;
  color: white;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.logo img {
  height: 42px;
}

/* BUTTON */
.btn-primary {
  background: #f59e0b;
  border: none;
  padding: 12px 20px;
  border-radius: 8px;
  cursor: pointer;
}

.btn-outline {
  border: 1px solid white;
  background: transparent;
  padding: 8px 15px;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

/* HERO */
.hero {
  height: 80vh;
  background: linear-gradient(#2563eb, #1e3a8a);
  color: white;
  display: flex;
  align-items: center;
  padding: 60px;
}

.hero h1 { font-size: 42px; }

/* FEATURES */
.features {
  display: flex;
  justify-content: space-around;
  padding: 50px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 16px;
  width: 250px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* DASHBOARD */
.dashboard {
  display: flex;
}

.sidebar {
  width: 220px;
  height: 100vh;
  background: #1e293b;
  color: white;
  padding: 20px;
}

.main {
  flex: 1;
  padding: 30px;
}

/* LAB */
.lab {
  margin-top: 30px;
  padding: 20px;
  background: white;
  border-radius: 16px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <img src="logo.png">
  </div>

  <div>
    <a href="#" style="color:white;margin-right:10px;">Home</a>
    <a href="#" style="color:white;margin-right:10px;">Fitur</a>
    <a href="#" style="color:white;margin-right:10px;">Tentang</a>
    <button class="btn-outline">Login</button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div>
    <h4>IPS Digital Lab</h4>
    <h1>Laboratorium Digital IPS</h1>
    <p>Belajar interaktif, simulatif, dan modern</p>
    <button class="btn-primary">Mulai Belajar</button>
  </div>
</div>

<!-- FEATURES -->
<div class="features">
  <div class="card">🌍 Peta Interaktif</div>
  <div class="card">🧪 Simulasi Sosial</div>
  <div class="card">🎮 Game Edukasi</div>
</div>

<!-- DASHBOARD -->
<div class="dashboard">

  <div class="sidebar">
    <h3>Menu</h3>
    <p>🏠 Dashboard</p>
    <p>📚 Modul</p>
    <p>🧪 Lab</p>
    <p>📝 Evaluasi</p>
  </div>

  <div class="main">
    <h2>Selamat datang 👋</h2>

    <!-- LAB SIMULASI -->
    <div class="lab">
      <h3>Simulasi Ekonomi</h3>

      <p>Harga: <span id="harga">5000</span></p>
      <input type="range" min="1000" max="10000" value="5000" id="sliderHarga">

      <p>Produksi: <span id="produksi">100</span></p>
      <input type="range" min="10" max="500" value="100" id="sliderProduksi">

      <br><br>
      <button class="btn-primary" onclick="hitung()">Jalankan</button>

      <p id="hasil"></p>
    </div>

  </div>
</div>

<!-- AUTH MODAL -->
<div id="authBox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000000aa;">
  <div style="background:white;width:300px;margin:100px auto;padding:20px;border-radius:10px;">
    
    <h3>Login Lab IPS</h3>

    <input id="email" placeholder="Email" style="width:100%;padding:8px;margin:5px 0;">
    <input id="password" type="password" placeholder="Password" style="width:100%;padding:8px;margin:5px 0;">

    <button onclick="signUp()" class="btn-primary" style="width:100%;margin-top:10px;">Sign Up</button>
    <button onclick="signIn()" style="width:100%;margin-top:10px;">Sign In</button>

    <button onclick="closeAuth()" style="margin-top:10px;">Tutup</button>
  </div>
</div>

<!-- SCRIPT SIMULASI -->
<script>
function hitung() {
  let harga = document.getElementById("sliderHarga").value;
  let produksi = document.getElementById("sliderProduksi").value;

  document.getElementById("harga").innerText = harga;
  document.getElementById("produksi").innerText = produksi;

  let permintaan = 10000 / harga * produksi;

  document.getElementById("hasil").innerText =
    permintaan < 100 ? "Permintaan rendah" : "Permintaan meningkat";
}
</script>

<!-- SUPABASE + AUTH -->
<script>
const supabaseUrl = "YOUR_SUPABASE_URL";
const supabaseKey = "YOUR_SUPABASE_ANON_KEY";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

function openAuth() {
  document.getElementById("authBox").style.display = "block";
}

function closeAuth() {
  document.getElementById("authBox").style.display = "none";
}

async function signUp() {
  const email = email.value;
  const password = password.value;

  const { error } = await supabaseClient.auth.signUp({ email, password });

  alert(error ? error.message : "Cek email untuk verifikasi!");
}

async function signIn() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email, password
  });

  alert(error ? error.message : "Login berhasil!");
  if (!error) closeAuth();
}

document.querySelector(".btn-outline").onclick = openAuth;
</script>

</body>
</html>
