<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>IPS LABX</title>

<style>
body {
  margin: 0;
  background: #020617;
  overflow: hidden;
  font-family: Poppins, sans-serif;
  color: white;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
}

.hero {
  position: relative;
  z-index: 10;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.logo {
  width: 400px;
  filter: drop-shadow(0 0 25px cyan);
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 10px;
  border: none;
  background: cyan;
  cursor: pointer;
}

/* MODAL */
.modal {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #0F172A;
  padding: 30px;
  border-radius: 15px;
  width: 300px;
}

input {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="hero">
  <img src="logo.png" class="logo">
  <h1>IPS LABX</h1>
  <button class="btn" onclick="openModal()">Mulai</button>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Login</h2>
    <input placeholder="Email">
    <input placeholder="Password" type="password">
    <button class="btn">Masuk</button>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouse = { x: null, y: null };

document.addEventListener("mousemove", e => {
  mouse.x = e.x;
  mouse.y = e.y;
});

let particles = [];

for (let i = 0; i < 120; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: Math.random() - 0.5,
    vy: Math.random() - 0.5,
    size: 2
  });
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // gambar partikel
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;

    // tarik ke mouse
    let dx = mouse.x - p.x;
    let dy = mouse.y - p.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < 150) {
      p.x += dx * 0.02;
      p.y += dy * 0.02;
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fillStyle = "cyan";
    ctx.fill();

    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
  });

  // garis antar partikel
  for (let i = 0; i < particles.length; i++) {
    for (let j = i+1; j < particles.length; j++) {
      let dx = particles[i].x - particles[j].x;
      let dy = particles[i].y - particles[j].y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < 100) {
        ctx.beginPath();
        ctx.strokeStyle = "rgba(0,255,255," + (1 - dist/100) + ")";
        ctx.lineWidth = 1;
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}

draw();

/* MODAL */
function openModal() {
  document.getElementById("modal").style.display = "flex";
}
</script>

</body>
</html>
