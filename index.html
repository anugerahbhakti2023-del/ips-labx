<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>IPS LABX</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020617;
  color: white;
  overflow: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.logo {
  width: 350px;
  filter: drop-shadow(0 0 20px cyan);
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 10px;
  border: none;
  background: cyan;
  cursor: pointer;
  font-size: 16px;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.8);
}

.modal-content {
  background: #0F172A;
  padding: 25px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}
</style>

</head>

<body>

<canvas id="canvas"></canvas>

<div class="hero">
  <img src="logo.png" class="logo">
  <h1>IPS LABX</h1>
  <button class="btn" id="btnMulai">Mulai</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Login / Daftar</h2>
    <input type="text" placeholder="Email">
    <input type="password" placeholder="Password">
    <button class="btn">Masuk</button>
  </div>
</div>

<script>
/* ===== PARTICLE ===== */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouse = { x: 0, y: 0 };

document.addEventListener("mousemove", (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

let particles = [];

for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: Math.random() - 0.5,
    vy: Math.random() - 0.5
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {

    let dx = mouse.x - p.x;
    let dy = mouse.y - p.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < 120) {
      p.x += dx * 0.02;
      p.y += dy * 0.02;
    }

    p.x += p.vx;
    p.y += p.vy;

    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
    ctx.fillStyle = "cyan";
    ctx.fill();

    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
  });

  requestAnimationFrame(animate);
}

animate();

/* ===== MODAL FIX ===== */
const btn = document.getElementById("btnMulai");
const modal = document.getElementById("modal");

btn.addEventListener("click", () => {
  modal.style.display = "flex";
});

/* klik luar modal = close */
window.addEventListener("click", (e) => {
  if (e.target === modal) {
    modal.style.display = "none";
  }
});
</script>

</body>
</html>
