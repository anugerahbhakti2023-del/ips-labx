<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>IPS LABX</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: white;
  overflow: hidden;
}

/* CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  perspective: 1000px;
}

/* LOGO */
.logo {
  width: 550px;
  max-width: 95%;
  transition: transform 0.15s ease;
  filter: drop-shadow(0 0 40px rgba(0,255,255,0.7));
}

/* TEXT */
h1 {
  margin-top: 20px;
  font-size: 42px;
  letter-spacing: 2px;
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 12px 28px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(45deg, cyan, #3b82f6);
  color: white;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.08);
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.85);
}

.modal-content {
  background: #0F172A;
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,255,255,0.3);
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="hero">
  <img src="logo.png" class="logo" id="logo">
  <h1>IPS LABX</h1>
  <p>Laboratorium Digital IPS Interaktif</p>
  <button class="btn" id="btnMulai">Mulai</button>
</div>

<!-- MODAL LOGIN -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Login / Daftar</h2>
    <input type="text" placeholder="Email">
    <input type="password" placeholder="Password">
    <button class="btn">Masuk</button>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouse = { x: 0, y: 0 };

document.addEventListener("mousemove", (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

/* PARTICLES (LEBIH BANYAK + SMOOTH) */
let particles = [];

for (let i = 0; i < 250; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.7,
    vy: (Math.random() - 0.5) * 0.7,
    size: Math.random() * 2 + 1
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {

    let dx = mouse.x - p.x;
    let dy = mouse.y - p.y;
    let dist = Math.sqrt(dx * dx + dy * dy);

    // efek tarik halus
    if (dist < 120) {
      p.x += dx * 0.01;
      p.y += dy * 0.01;
    }

    p.x += p.vx;
    p.y += p.vy;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(0,255,255,0.8)";
    ctx.fill();

    // bounce
    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
  });

  requestAnimationFrame(animate);
}

animate();

/* LOGO 3D */
const logo = document.getElementById("logo");

document.addEventListener("mousemove", (e) => {
  let x = (window.innerWidth / 2 - e.clientX) / 25;
  let y = (window.innerHeight / 2 - e.clientY) / 25;

  logo.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* MODAL */
const btn = document.getElementById("btnMulai");
const modal = document.getElementById("modal");

btn.addEventListener("click", () => {
  modal.style.display = "flex";
});

window.addEventListener("click", (e) => {
  if (e.target === modal) {
    modal.style.display = "none";
  }
});
</script>

</body>
</html>
