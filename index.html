<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>IPS LABX</title>

<style>
body {
  margin: 0;
  font-family: Poppins, sans-serif;
  background: #020617;
  color: white;
  overflow-x: hidden;
}

/* CANVAS PARTICLE */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 60px;
  position: fixed;
  width: 100%;
  backdrop-filter: blur(10px);
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  perspective: 1000px;
}

/* LOGO 3D */
.logo {
  width: 500px;
  max-width: 90%;
  transition: transform 0.2s;
  filter: drop-shadow(0 0 30px rgba(0,255,255,0.6));
}

/* TEXT */
h1 {
  font-size: 50px;
  background: linear-gradient(to right, cyan, #60a5fa);
  -webkit-background-clip: text;
  color: transparent;
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(to right, #22d3ee, #3b82f6);
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}
</style>

</head>
<body>

<canvas id="particles"></canvas>

<div class="navbar">
  <b>IPS LABX</b>
</div>

<div class="hero">
  <img src="logo.png" class="logo" id="logo">
  <h1>IPS LABX</h1>
  <p>Laboratorium Digital Interaktif</p>
  <button class="btn">Mulai</button>
</div>

<script>
/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 3,
    speedX: Math.random() - 0.5,
    speedY: Math.random() - 0.5
  });
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;

    ctx.fillStyle = "rgba(0,255,255,0.7)";
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();

    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
  });

  requestAnimationFrame(animateParticles);
}

animateParticles();

/* 3D TILT EFFECT */
const logo = document.getElementById("logo");

document.addEventListener("mousemove", (e) => {
  let x = (window.innerWidth / 2 - e.clientX) / 20;
  let y = (window.innerHeight / 2 - e.clientY) / 20;

  logo.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});
</script>

</body>
</html>
