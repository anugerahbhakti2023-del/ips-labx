<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>IPS LABX</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020617;
  color: white;
  overflow: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  perspective: 1000px;
}

.logo {
  width: 350px;
  transition: transform 0.15s;
  filter: drop-shadow(0 0 25px cyan);
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 10px;
  border: none;
  background: cyan;
  cursor: pointer;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.8);
}

.modal-content {
  background: #0F172A;
  padding: 25px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}
</style>

</head>

<body>

<canvas id="canvas"></canvas>

<div class="hero">
  <img src="logo.png" class="logo" id="logo">
  <h1>IPS LABX</h1>
  <button class="btn" id="btnMulai">Mulai</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Login / Daftar</h2>
    <input type="text" placeholder="Email">
    <input type="password" placeholder="Password">
    <button class="btn">Masuk</button>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouse = { x: 0, y: 0 };

document.addEventListener("mousemove", (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

/* PARTICLES */
let particles = [];

for (let i = 0; i < 120; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: Math.random() - 0.5,
    vy: Math.random() - 0.5
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < particles.length; i++) {
    let p = particles[i];

    // interaksi mouse
    let dx = mouse.x - p.x;
    let dy = mouse.y - p.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < 120) {
      p.x += dx * 0.02;
      p.y += dy * 0.02;
    }

    p.x += p.vx;
    p.y += p.vy;

    // gambar titik
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
    ctx.fillStyle = "cyan";
    ctx.fill();

    // NETWORK EFFECT (GARIS)
    for (let j = i; j < particles.length; j++) {
      let p2 = particles[j];
      let dx2 = p.x - p2.x;
      let dy2 = p.y - p2.y;
      let dist2 = Math.sqrt(dx2*dx2 + dy2*dy2);

      if (dist2 < 100) {
        ctx.beginPath();
        ctx.strokeStyle = "rgba(0,255,255,0.2)";
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }
    }

    // bounce
    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
  }

  requestAnimationFrame(animate);
}

animate();

/* LOGO 3D */
const logo = document.getElementById("logo");

document.addEventListener("mousemove", (e) => {
  let x = (window.innerWidth / 2 - e.clientX) / 20;
  let y = (window.innerHeight / 2 - e.clientY) / 20;

  logo.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* MODAL */
const btn = document.getElementById("btnMulai");
const modal = document.getElementById("modal");

btn.addEventListener("click", () => {
  modal.style.display = "flex";
});

window.addEventListener("click", (e) => {
  if (e.target === modal) {
    modal.style.display = "none";
  }
});
</script>

</body>
</html>
