<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPS LABX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Open+Sans&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:'Open Sans',sans-serif;background:#f1f5f9}
h1,h2,h3{font-family:'Poppins'}

/* LANDING */
#landing{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#2563eb,#1e3a8a);
  color:white;
  text-align:center;
  position:relative;
}

/* NAVBAR */
.navbar{
  position:absolute;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

/* BUTTON */
button{
  background:#2563eb;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  width:240px;
  height:100vh;
  background:#1e293b;
  color:white;
  padding:20px;
  display:none;
}
.sidebar div{margin:15px 0;cursor:pointer}

/* MAIN */
.main{
  margin-left:240px;
  padding:30px;
  display:none;
}

/* CARD */
.card{
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  margin-bottom:20px;
}

/* PAGE */
.page{display:none}
.page.active{display:block}

/* PROGRESS */
.bar{width:300px;height:10px;background:#ddd;border-radius:10px}
.fill{width:80%;height:100%;background:#10b981;border-radius:10px}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}
.modal-box{
  background:white;
  padding:30px;
  border-radius:12px;
  width:300px;
}
input{width:100%;padding:8px;margin:10px 0}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing">

  <!-- NAVBAR -->
  <div class="navbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="logo.png" width="100">
      <b>IPS LABX</b>
    </div>

    <div>
      <button onclick="openLogin()" style="background:transparent;border:1px solid white;">Login</button>
      <button onclick="openRegister()" style="background:#f59e0b;">Sign Up</button>
    </div>
  </div>

  <img src="logo.png" width="500">
  <h1>IPS LABX</h1>
  <p>Laboratorium Digital IPS Interaktif</p>
  <button onclick="startApp()">Mulai Belajar</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2 style="display:flex;align-items:center;gap:10px;">
    <img src="logo.png" width="30"> IPS LABX
  </h2>
  <div onclick="showPage('dash')">🏠 Dashboard</div>
  <div onclick="showPage('lab')">🧪 Laboratorium</div>
  <div onclick="showPage('quiz')">📝 Quiz</div>
</div>

<!-- MAIN -->
<div class="main">

<div id="dash" class="page active">
  <div class="card">
    <h3>Progress</h3>
    <div class="bar"><div class="fill"></div></div>
    <p>80% selesai</p>
  </div>

  <div class="card">🌏 ASEAN</div>
  <div class="card">👥 Sosial</div>
  <div class="card">💰 Ekonomi</div>
</div>

<div id="lab" class="page">
  <div class="card">
    <h3>Simulasi Ekonomi</h3>

    Harga: <span id="harga">5000</span>
    <input type="range" min="1000" max="10000" value="5000" oninput="setHarga(this.value)">

    Produksi: <span id="prod">100</span>
    <input type="range" min="10" max="200" value="100" oninput="setProd(this.value)">

    <br><br>
    <button onclick="simulasi()">Jalankan</button>
  </div>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

  <div class="card" id="hasil"></div>
</div>

<div id="quiz" class="page">
  <div class="card">
    <h3>Quiz</h3>
    <p>Apa dampak interaksi ruang?</p>

    <label><input type="radio" name="q" value="1"> Mobilitas meningkat</label><br>
    <label><input type="radio" name="q" value="0"> Tidak ada perubahan</label><br>

    <br>
    <button onclick="cek()">Submit</button>
    <p id="nilai"></p>
  </div>
</div>

</div>

<!-- LOGIN -->
<div id="loginBox" class="modal">
  <div class="modal-box">
    <h3>Login</h3>
    <input placeholder="Email">
    <input type="password" placeholder="Password">
    <button onclick="closeLogin()">Masuk</button>
  </div>
</div>

<!-- REGISTER -->
<div id="registerBox" class="modal">
  <div class="modal-box">
    <h3>Sign Up</h3>
    <input placeholder="Email">
    <input type="password" placeholder="Password">
    <button onclick="closeRegister()">Daftar</button>
  </div>
</div>

<script>
let chart;

function startApp(){
  document.getElementById('landing').style.display='none';
  document.querySelector('.sidebar').style.display='block';
  document.querySelector('.main').style.display='block';
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function openLogin(){document.getElementById('loginBox').style.display='flex'}
function closeLogin(){document.getElementById('loginBox').style.display='none'}
function openRegister(){document.getElementById('registerBox').style.display='flex'}
function closeRegister(){document.getElementById('registerBox').style.display='none'}

function setHarga(v){document.getElementById('harga').innerText=v}
function setProd(v){document.getElementById('prod').innerText=v}

function simulasi(){
  let harga = +document.getElementById('harga').innerText;
  let prod = +document.getElementById('prod').innerText;
  let demand = 10000 / harga * prod;

  let teks = 'Permintaan: '+Math.round(demand);

  if(harga > 7000){
    teks += ' | Harga tinggi → permintaan turun';
  } else if(harga < 3000){
    teks += ' | Harga rendah → permintaan naik';
  } else {
    teks += ' | Harga seimbang';
  }

  document.getElementById('hasil').innerText = teks;

  let ctx = document.getElementById('chart');
  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:'line',
    data:{
      labels:['Harga','Produksi','Permintaan'],
      datasets:[{
        label:'Simulasi',
        data:[harga,prod,demand]
      }]
    }
  });
}

function cek(){
  let val = document.querySelector('input[name=q]:checked');
  if(!val) return alert('Pilih dulu');

  document.getElementById('nilai').innerText =
    val.value==1 ? 'Benar ✔ | Skor 100' : 'Salah ❌ | Skor 0';
}
</script>

</body>
</html>
