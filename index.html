<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>IPS LABX</title>

<style>
body {
  margin: 0;
  font-family: Poppins, sans-serif;
  background: #0F172A;
  color: white;
  overflow-x: hidden;
}

/* PARALLAX BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 20% 20%, #1E3A8A, #020617);
  z-index: -1;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 60px;
  position: fixed;
  width: 100%;
  backdrop-filter: blur(10px);
}

.navbar a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
  transition: 0.3s;
}

.navbar a:hover {
  color: cyan;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

/* LOGO */
.logo {
  width: 500px;
  max-width: 90%;
  animation: float 4s ease-in-out infinite;
  transition: 0.5s;
  filter: drop-shadow(0 0 20px rgba(0,255,255,0.6));
}

.logo:hover {
  transform: scale(1.08);
}

/* FLOAT ANIMATION */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0px); }
}

/* TEXT */
h1 {
  font-size: 48px;
  margin-top: 20px;
  background: linear-gradient(to right, cyan, #60a5fa);
  -webkit-background-clip: text;
  color: transparent;
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(to right, #22d3ee, #3b82f6);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* SECTION */
.section {
  padding: 100px 60px;
  text-align: center;
}

/* CARD */
.card {
  display: inline-block;
  background: rgba(255,255,255,0.05);
  padding: 25px;
  margin: 10px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
  background: rgba(255,255,255,0.1);
}

/* PARALLAX SCROLL EFFECT */
.parallax {
  transform: translateY(0);
  transition: transform 0.2s;
}
</style>

</head>
<body>

<div class="bg"></div>

<!-- NAVBAR -->
<div class="navbar">
  <div><b>IPS LABX</b></div>
  <div>
    <a href="#">Home</a>
    <a href="#">Fitur</a>
    <a href="#">Tentang</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <img src="logo.png" class="logo parallax" id="logo">
  
  <h1>IPS LABX</h1>
  <p>Laboratorium Digital IPS Interaktif</p>
  
  <button class="btn">Mulai Eksplorasi</button>
</div>

<!-- FEATURES -->
<div class="section">
  <div class="card">🌍 Simulasi Interaktif</div>
  <div class="card">🧪 Eksperimen Sosial</div>
  <div class="card">📊 Analisis Data</div>
</div>

<!-- SCRIPT PARALLAX -->
<script>
window.addEventListener("scroll", function() {
  let scroll = window.scrollY;
  document.getElementById("logo").style.transform =
    "translateY(" + scroll * 0.2 + "px)";
});
</script>

</body>
</html>
